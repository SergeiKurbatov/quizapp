spring.application.name=quizapp
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quizapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:quizapp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:quizapp_pass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}