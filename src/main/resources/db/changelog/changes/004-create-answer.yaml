databaseChangeLog:
  - changeSet:
      id: 004-create-answer
      author: team35
      changes:
        - createTable:
            tableName: answer
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_answer_question
                    references: question(id)
              - column:
                  name: text
                  type: VARCHAR(255)
              - column:
                  name: is_correct
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: version
                  type: VARCHAR(50)
      rollback:
        - dropTable:
            tableName: answer
