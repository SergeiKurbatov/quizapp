databaseChangeLog:
  - changeSet:
      id: 003-create-question
      author: team35
      changes:
        - createTable:
            tableName: question
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: quiz_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_question_quiz
                    references: quiz(id)
              - column:
                  name: text
                  type: TEXT
              - column:
                  name: question_type
                  type: VARCHAR(50)
              - column:
                  name: time_limit
                  type: INT
              - column:
                  name: version
                  type: VARCHAR(50)
      rollback:
        - dropTable:
            tableName: question
