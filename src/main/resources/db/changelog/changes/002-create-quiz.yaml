databaseChangeLog:
  - changeSet:
      id: 002-create-quiz
      author: team35
      changes:
        - createTable:
            tableName: quiz
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: theme
                  type: VARCHAR(255)
              - column:
                  name: creator_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_quiz_creator
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: VARCHAR(50)
      rollback:
        - dropTable:
            tableName: quiz
