databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: team35
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_username
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_email
              - column:
                  name: password_hash
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
      rollback:
        - dropTable:
            tableName: users
