version: '3.8'

# These are the 3 "containers" that will run together
services:

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: quizapp-db
    environment:
      POSTGRES_DB: quizapp
      POSTGRES_USER: quizapp_user
      POSTGRES_PASSWORD: quizapp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizapp_user -d quizapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: .
    container_name: quizapp-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quizapp
      SPRING_DATASOURCE_USERNAME: quizapp_user
      SPRING_DATASOURCE_PASSWORD: quizapp_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---- React Frontend ----
  frontend:
    build:
      context: ./frontend
    container_name: quizapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

# Persistent volume for database data
volumes:
  postgres_data: